<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-with, initial-scale=1.0">
    <link rel="stylesheet" href="/aula 04/style.css">
    <title>Document</title>
</head>
<body>
    <form action="">
        <!--Formulario-->

        <!--Usuario-->
        <label for="usuario"></label>
        <input id="usuario" type="text" placeholder="Insira seu nome" required><br>

        <!--Email-->
        <label for="Email"></label>
        <input id="Email" type=" email" placeholder="exemplo@dominio.com" required><br>

        <!--Senha-->
        <label for="Senha"></label>
        <input id="senha"type="password" placeholder="Insira sua senha" required><br>

        <!--cpf-->
        <label for="cpf"></label>
        <input id="cpf"type="number" placeholder="Insira seu cpf" required><br>

        <!--data de nascimento-->
        <label for="data de nascimento"></label>
        <input id="data de nascimento"type="date" placeholder="Insira sua senha" required><br>

        <!--genero-->
        <input type="radio" id="mas">
        <label for="mas">Masculino</label>

        <input type="radio" id="fem">
        <label for="fem">Feminino</label>

        <input type="radio" id="outros">
        <label for="outros">Outros</label><br>

        <button>enviar</button>
    </form>
</body>
</html>
